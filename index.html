<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع محمد - البصرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #0a0a0a;
            --card-bg: #1a1a1a;
            --gold: #ffcc00;
            --neon-red: #ff0000;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 40px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* تصميم أيقونة الهز كتافه الجديدة */
        .profile-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            box-shadow: 0 0 25px var(--neon-red);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            background: #000;
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
        }

        h1 {
            font-size: 2.2rem;
            margin: 10px 0;
        }

        .subtitle {
            color: var(--gold);
            font-size: 1rem;
            margin-bottom: 25px;
